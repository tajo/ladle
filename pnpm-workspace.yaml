packages:
  - 'packages/example'
  - 'packages/ladle'
  - 'packages/website'
  - 'e2e/addons'
  - 'e2e/babel'
  - 'e2e/commonjs'
  - 'e2e/config'
  - 'e2e/config-ts'
  - 'e2e/css'
  - 'e2e/decorators'
  - 'e2e/playwright'
  - 'e2e/playwright-config'
  - 'e2e/programmatic'
  - 'e2e/provider'
  - 'e2e/baseweb'
  - 'e2e/msw'

# pnpm 10+ does not run dependency build scripts unless they are allowlisted.
# These need their native binary / postinstall to build (e.g. @swc/core and
# sharp), so allow them explicitly.
allowBuilds:
  '@swc/core': true
  core-js: true
  msw: true
  sharp: true

# pnpm 11 gates freshly published versions behind a minimum release age
# supply-chain check. prettier@3.9.1 is newer than that window, so allow it
# explicitly (it is the latest stable release).
minimumReleaseAgeExclude:
  - prettier@3.9.1

peerDependencyRules:
  allowedVersions:
    "@types/react": "19"
    react: "19"
    react-dom: "19"
    typescript: "6"

# Pin a single @mdx-js/react so Docusaurus packages don't end up with two
# copies (3.1.0 + 3.1.1), which produces duplicate React context instances and
# breaks the website's static site generation (DocSearch / docs version hooks).
overrides:
  "@mdx-js/react": "^3.1.1"
